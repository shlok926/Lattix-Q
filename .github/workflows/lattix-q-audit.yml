name: Cryptographic Vulnerability Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Execute Lattix-Q CLI Scan
      run: |
        python lattix_q_scanner.py --path . --output report.json

    - name: Archive Scan Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lattix-q-scan-report
        path: report.json
